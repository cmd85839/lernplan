<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernplan</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --card-today: #131d2e;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #475569;
  --border: rgba(148,163,184,0.18);
  --border-btn: rgba(148,163,184,0.3);
  --slot-hover: rgba(255,255,255,0.05);
  --btn-hover: rgba(255,255,255,0.06);
  --today-border: rgba(59,130,246,0.38);
  --plus-color: #334155;
  --shadow: rgba(0,0,0,0.5);
}
:root.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --card-today: #f4f8ff;
  --text: #0f172a;
  --text-dim: #334155;
  --text-muted: #64748b;
  --border: rgba(0,0,0,0.09);
  --border-btn: rgba(0,0,0,0.2);
  --slot-hover: rgba(0,0,0,0.03);
  --btn-hover: rgba(0,0,0,0.05);
  --today-border: rgba(59,130,246,0.35);
  --plus-color: #c7d2e0;
  --shadow: rgba(0,0,0,0.18);
}
/* Clip scrollbar but not overflowing children */
html { overflow-x: hidden; }
html, body {
  background: var(--bg) !important;
  color: var(--text);
  margin: 0; padding: 0;
  transition: background 0.2s, color 0.2s;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  padding: 10px;
}
#root { max-width: 720px; margin: 0 auto; }

/* Fixed height — crop line always at same distance from grid top */
.day-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  grid-template-rows: 1fr;
  height: 205px;
  overflow: hidden;
  gap: 8px;
}
.day-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 5px 5px 4px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  position: relative;
  transition: background 0.2s, border-color 0.2s;
}
.slot {
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 6px;
  padding: 3px 4px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-top: 4px;
  width: 100%;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  transition: background 0.15s, border-color 0.15s;
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
.slot:hover { background: var(--slot-hover); }
button {
  background: transparent;
  border: 0.5px solid var(--border-btn);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  font-family: inherit;
  font-size: inherit;
  transition: background 0.15s;
}
button:hover { background: var(--btn-hover); }
.card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.mod-btn {
  border: 1px solid;
  border-radius: 7px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
.mod-btn:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  const MODS=[
    {id:'chin', name:'Chinesisch',    s:'CHN',  c:'#60a5fa'},
    {id:'ms',   name:'Masterseminar', s:'MS',   c:'#a78bfa'},
    {id:'uam',  name:'UAM',          s:'UAM',  c:'#fbbf24'},
    {id:'fof2', name:'FoF2',         s:'FoF2', c:'#4ade80'},
    {id:'am',   name:'Alg. Mgmt',    s:'AM',   c:'#22d3ee'},
    {id:'kum',  name:'KUM',          s:'KUM',  c:'#fb923c'},
    {id:'tuu',  name:'TuU KI',       s:'TuU',  c:'#f472b6'},
  ];
  const EXAMS=[
    {mid:'chin', d:'2026-07-15', l:'Chinesisch Prüfung'},
    {mid:'ms',   d:'2026-06-19', l:'Masterseminar Abgabe'},
    {mid:'uam',  d:'2026-07-30', l:'UAM Klausur'},
    {mid:'fof2', d:'2026-07-31', l:'FoF2 Klausur'},
    {mid:'am',   d:'2026-08-18', l:'AM Klausur'},
    {mid:'kum',  d:'2026-08-26', l:'KUM Klausur'},
  ].sort((a,b)=>a.d.localeCompare(b.d));

  const SCFG={
    1:{ morning:{ badge:{l:'Chinesisch VL',t:'8:00–9:30',c:'#60a5fa'} }, noon:{}, evening:{} },
    3:{ morning:{}, noon:{ badge:{l:'Chinesisch VL',t:'15:20–17:00',c:'#60a5fa'} }, evening:{} },
  };
  const SLOT_LABELS={morning:'Morgen',noon:'Mittag',evening:'Abend'};
  const DS_S=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const DS_L=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

  const viewParam=new URLSearchParams(location.search).get('view');
  const showDays =!viewParam||viewParam==='days';
  const showExams=!viewParam||viewParam==='exams';

  const todayDate=new Date(); todayDate.setHours(0,0,0,0);
  let CD=new Date(todayDate);
  let plans={}, active=null, dark=true;

  (function loadData(){
    try{
      const v2=localStorage.getItem('lernplan_v2');
      if(v2){
        plans=JSON.parse(v2);
        let dirty=false;
        for(const [date,slots] of Object.entries(plans)){
          if('afternoon' in slots){
            const dow=new Date(date).getDay();
            const t=dow===1?'evening':'noon';
            if(!slots[t]) slots[t]=slots.afternoon;
            delete slots.afternoon; dirty=true;
          }
        }
        if(dirty) save();
        return;
      }
      const v1=localStorage.getItem('lernplan_v1');
      if(!v1) return;
      const old=JSON.parse(v1);
      const idx={Mo:0,Di:1,Mi:2,Do:3,Fr:4,Sa:5};
      for(const [ws,slots] of Object.entries(old)){
        const mon=new Date(ws);
        for(const [key,mid] of Object.entries(slots)){
          const[abbr,sl]=key.split('-');
          if(idx[abbr]===undefined) continue;
          const d=new Date(mon); d.setDate(d.getDate()+idx[abbr]);
          const dk=d.toISOString().split('T')[0];
          if(!plans[dk]) plans[dk]={};
          const dow=d.getDay();
          if(sl==='morning') plans[dk].morning=mid;
          else plans[dk][dow===1?'evening':'noon']=mid;
        }
      }
      save();
    }catch(e){}
  })();

  try{ const d=localStorage.getItem('lernplan_dark'); if(d!==null) dark=d==='1'; }catch(e){}
  function applyTheme(){ document.documentElement.classList.toggle('light',!dark); }
  applyTheme();

  window._pd=()=>{ CD=addD(CD,-1); active=null; render(); };
  window._nd=()=>{ CD=addD(CD,1);  active=null; render(); };
  window._ht=()=>{ CD=new Date(todayDate); active=null; render(); };
  window._cl=()=>{
    [addD(CD,-1), new Date(CD), addD(CD,1)].forEach(d=>{
      delete plans[dkey(d)];
    });
    active=null;
    save();
    render();
  };
  window._ts=(dk,sl)=>{ active=(active?.dk===dk&&active?.sl===sl)?null:{dk,sl}; render(); };
  window._sm=(mid)=>{
    if(!active) return;
    if(!plans[active.dk]) plans[active.dk]={};
    if(mid) plans[active.dk][active.sl]=mid;
    else    delete plans[active.dk][active.sl];
    active=null; save(); render();
  };
  window._tm=()=>{ dark=!dark; localStorage.setItem('lernplan_dark',dark?'1':'0'); applyTheme(); render(); };

  function addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function getMon(d){ const dt=new Date(d); dt.setHours(0,0,0,0); const day=dt.getDay(); dt.setDate(dt.getDate()-(day===0?6:day-1)); return dt; }
  function dkey(d){ return d.toISOString().split('T')[0]; }
  function kw(d){
    const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dn=dt.getUTCDay()||7; dt.setUTCDate(dt.getUTCDate()+4-dn);
    return Math.ceil((((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/86400000)+1)/7);
  }
  function fmt(d){ return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
  function duc(s){ const n=new Date(); n.setHours(0,0,0,0); return Math.ceil((new Date(s)-n)/86400000); }
  function gs(d,sl){ return plans[dkey(d)]?.[sl]||null; }
  function save(){ try{ localStorage.setItem('lernplan_v2',JSON.stringify(plans)); }catch(e){} }

  function slotCfg(dow,sl){ return ((SCFG[dow]||{})[sl])||{}; }
  function isDayComplete(d){
    const dow=d.getDay();
    return ['morning','noon','evening'].every(sl=>gs(d,sl));
  }

  function slotHtml(d, sl, mt){
    const dow=d.getDay();
    const cfg=slotCfg(dow,sl);
    const m=gs(d,sl); const mod=m?MODS.find(x=>x.id===m):null;
    const dk=dkey(d);
    const isA=active?.dk===dk&&active?.sl===sl;
    const lbl=SLOT_LABELS[sl];
    const mtStyle=mt!==undefined?`margin-top:${mt}px;`:'';

    let bg,bd;
    if(mod){ bg=mod.c+'18'; bd=mod.c+'66'; }
    else if(isA){ bg=dark?'rgba(255,255,255,0.08)':'rgba(0,0,0,0.05)'; bd=dark?'rgba(148,163,184,0.4)':'rgba(0,0,0,0.22)'; }
    else { bg='transparent'; bd='var(--border)'; }

    let inner='';
    if(cfg.badge){
      const b=cfg.badge;
      inner+=`<div style="background:${b.c}15;border-left:2px solid ${b.c};border-radius:2px;padding:2px 3px;width:100%;text-align:left;flex-shrink:0;overflow:hidden">
        <div style="font-size:9px;font-weight:600;color:${b.c};white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${b.l}</div>
        <div style="font-size:8px;color:${b.c}99">${b.t}</div>
      </div>`;
    }
    if(mod){
      inner+=`<span style="font-size:13px;font-weight:700;color:${mod.c};margin-top:${cfg.badge?'2':'0'}px">${mod.s}</span>`;
    } else {
      inner+=`<span style="font-size:16px;color:var(--plus-color);line-height:1;margin-top:${cfg.badge?'1':'0'}px">+</span>`;
      if(!cfg.badge) inner+=`<span style="font-size:10px;color:var(--text-muted);margin-top:1px">${lbl}</span>`;
    }
    return `<button class="slot" onclick="_ts('${dk}','${sl}')" style="${mtStyle}background:${bg};border-color:${bd}">${inner}</button>`;
  }

  function render(){
    const days=[addD(CD,-1),new Date(CD),addD(CD,1)];
    const todayTs=todayDate.getTime();
    const themeIcon=dark?'&#9728;':'&#9790;';
    let h='';

    if(showDays){
      // ── Header: same width as deadlines (full #root width) ────────────
      h+=`<div style="text-align:center;cursor:pointer;margin-bottom:8px" onclick="_ht()">
        <div style="font-size:15px;font-weight:700;color:var(--text)">KW ${kw(CD)} &middot; ${fmt(days[0])} &ndash; ${fmt(days[2])}</div>
      </div>`;

      h+=`<div style="margin-bottom:${showExams?'40':'10'}px">
        <div class="day-grid">`;

      for(let i=0;i<3;i++){
        const dd=days[i];
        const isTod=dd.getTime()===todayTs;
        const dow=dd.getDay();
        const isMon=dow===1;
        const complete=isDayComplete(dd);
        const borderColor=complete?'rgba(74,222,128,0.45)':isTod?'var(--today-border)':'var(--border)';
        const cardBg=isTod?'var(--card-today)':'var(--card)';

        h+=`<div class="day-card" style="background:${cardBg};border-color:${borderColor}">
          <!-- Day header: name · date in one line -->
          <div style="text-align:center;margin-bottom:3px;flex-shrink:0;white-space:nowrap">
            <span style="font-size:13px;font-weight:700;color:${isTod?'#60a5fa':'var(--text)'}">${DS_S[dow]}</span>
            <span style="font-size:10px;color:var(--text-muted)"> &middot; ${fmt(dd)}</span>
          </div>`;

        h+=`<div style="display:flex;flex-direction:column;flex:1;min-height:0">`;
        h+=`<div style="position:relative;display:flex;flex-direction:column;flex:2;min-height:0">`;
        h+=slotHtml(dd,'morning',4);
        h+=slotHtml(dd,'noon',4);

        // HiWi badge on Monday: only covers morning + noon slots
        if(isMon){
          h+=`<div style="position:absolute;right:0;top:4px;bottom:0;width:28%;
                          background:linear-gradient(180deg, rgba(96,165,250,0.18), rgba(100,116,139,0.14));
                          border-left:1px solid rgba(96,165,250,0.28);
                          box-shadow:inset 0 0 0 1px rgba(255,255,255,0.02);
                          border-radius:0 8px 8px 0;
                          display:flex;align-items:center;justify-content:center;
                          pointer-events:none;">
            <span style="writing-mode:vertical-rl;transform:rotate(180deg);
                         color:#8fbaf7;font-size:13px;font-weight:700;
                         letter-spacing:0.12em;text-transform:uppercase;">HiWi</span>
          </div>`;
        }

        h+=`</div>`;
        h+=slotHtml(dd,'evening',4);
        h+=`</div>`;

        h+=`</div>`; // end day-card
      }

      h+=`</div>`; // end .day-grid
      h+=`</div>`;
    }

    // ── Exams: same width as grid (full #root width), 2-column ──────────
    if(showExams){
      h+=`<div class="card" style="padding:9px 10px">
        <div style="font-size:10px;font-weight:600;color:var(--text-muted);
                    text-transform:uppercase;letter-spacing:0.07em;margin-bottom:7px">
          Prüfungen &amp; Deadlines
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">`;

      EXAMS.forEach(e=>{
        const mod=MODS.find(m=>m.id===e.mid);
        const d=duc(e.d);
        const uc=d<=14?'#f87171':d<=28?'#fbbf24':'#4ade80';
        const isAbgabe=e.l.includes('Abgabe');
        const type=isAbgabe?'Abgabe':e.l.includes('Prüfung')?'Prüfung':'Klausur';
        const col=mod?.c||'#888';
        // One-line format: "MS Abgabe · 19.06." + "38d" right
        const label=`${mod?.s||''} ${type}${isAbgabe?' 📝':''}`;
        h+=`<div style="background:${col}0d;border:0.5px solid ${col}30;
                        border-radius:7px;padding:5px 7px;
                        display:flex;align-items:center;justify-content:space-between;gap:4px">
          <div style="display:flex;align-items:center;gap:6px;min-width:0">
            <div style="width:10px;height:10px;border-radius:50%;background:${col};flex-shrink:0"></div>
            <span style="font-size:12px;font-weight:600;color:var(--text);
                         white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${label} <span style="font-weight:400;color:var(--text-muted)">&middot; ${fmt(new Date(e.d))}</span>
            </span>
          </div>
          <span style="font-size:14px;font-weight:700;color:${uc};flex-shrink:0">
            ${d>0?d+'d':d===0?'Heute':'–'}
          </span>
        </div>`;
      });

      h+=`</div></div>`; // end grid + card
    }

    if(showDays){
      h+=`<div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-top:64px;padding-bottom:8px">
        <button onclick="_pd()" style="width:34px;height:30px;padding:0;font-size:17px;
                line-height:1;display:flex;align-items:center;justify-content:center">&#8249;</button>
        <button onclick="_ht()" style="height:30px;padding:0 12px;font-size:11px;
                line-height:1;display:flex;align-items:center;justify-content:center">Heute</button>
        <button onclick="_tm()" style="min-width:42px;height:30px;padding:0 10px;font-size:12px;
                line-height:1;display:flex;align-items:center;justify-content:center">${themeIcon}</button>
        <button onclick="_cl()" style="height:30px;padding:0 12px;font-size:11px;
                line-height:1;display:flex;align-items:center;justify-content:center">Clear</button>
        <button onclick="_nd()" style="width:34px;height:30px;padding:0;font-size:17px;
                line-height:1;display:flex;align-items:center;justify-content:center">&#8250;</button>
      </div>`;
    }

    // ── Module Picker: below exams, in flow ───────────────────────────────
    if(active!==null){
      const activeDay=days.find(d=>dkey(d)===active.dk);
      const dow=activeDay?.getDay()??0;
      const lbl=SLOT_LABELS[active.sl]||active.sl;
      const dayName=activeDay?DS_L[dow]:active.dk;
      const wrapStyle=viewParam==='days'
        ?'position:fixed;bottom:10px;left:10px;right:10px;z-index:30'
        :'margin-top:10px';
      h+=`<div style="${wrapStyle}">
        <div class="card" style="padding:9px 11px;border:1px solid var(--border-btn);
                                 box-shadow:0 6px 24px var(--shadow)">
          <div style="font-size:11px;font-weight:500;color:var(--text-muted);
                      margin-bottom:7px;padding-bottom:6px;border-bottom:0.5px solid var(--border)">
            ${dayName} &middot; ${lbl} &mdash; Modul wählen
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px">
            ${MODS.map(m=>`<button class="mod-btn" onclick="_sm('${m.id}')" style="background:${m.c}18;border-color:${m.c}55;color:${m.c}">${m.s}</button>`).join('')}
            <button onclick="_sm(null)" style="padding:4px 10px;font-size:11px;color:var(--text-muted)">&#10005; leeren</button>
          </div>
        </div>
      </div>`;
    }

    document.getElementById('root').innerHTML=h;
  }

  render();
})();
</script>
</body>
</html>
