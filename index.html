<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernplan</title>
<style>
:root {
  --bg: #ffffff;
  --card: #182235;
  --card-today: #1d2f49;
  --text: #f8fbff;
  --text-dark: #182235;
  --text-dim: #d3dfef;
  --text-muted: #8fa1b8;
  --border: rgba(148,163,184,0.22);
  --border-btn: rgba(148,163,184,0.3);
  --slot-hover: rgba(255,255,255,0.82);
  --btn-hover: rgba(255,255,255,0.85);
  --today-border: rgba(96,165,250,0.9);
  --plus-color: #62748d;
  --shadow: rgba(15,23,42,0.12);
}
/* Clip scrollbar but not overflowing children */
html { overflow-x: hidden; }
html, body {
  background: var(--bg);
  background-repeat: no-repeat;
  background-attachment: scroll;
  color: var(--text);
  margin: 0; padding: 0;
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  padding: 14px 10px 18px;
}
#root { max-width: 720px; margin: 0 auto; }

/* Fixed height — crop line always at same distance from grid top */
.day-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  grid-template-rows: 1fr;
  height: 205px;
  overflow: hidden;
  gap: 12px;
}
.day-card {
  background: linear-gradient(180deg, rgba(24,34,53,0.96), rgba(15,23,42,0.98));
  border: 1px solid rgba(148,163,184,0.2);
  border-radius: 18px;
  padding: 8px 8px 7px;
  display: flex;
  flex-direction: column;
  height: 100%;
  overflow: hidden;
  position: relative;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 10px 28px rgba(15,23,42,0.08);
  transition: background 0.2s, border-color 0.2s, transform 0.2s;
}
.slot {
  background: linear-gradient(180deg, rgba(241,245,249,0.96), rgba(226,232,240,0.98));
  border: 1px solid rgba(203,213,225,0.95);
  border-radius: 14px;
  padding: 4px 5px;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 100%;
  flex: 1;
  min-height: 0;
  overflow: hidden;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.88),
    0 2px 8px rgba(15,23,42,0.08);
  transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.15s;
  font-family: inherit;
  font-size: inherit;
  color: inherit;
}
.slot:hover {
  background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(241,245,249,1));
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,1),
    0 4px 12px rgba(15,23,42,0.1);
  transform: translateY(-1px);
}
button {
  background: linear-gradient(180deg, rgba(24,34,53,0.96), rgba(15,23,42,0.98));
  border: 1px solid var(--border-btn);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 12px;
  font-family: inherit;
  font-size: inherit;
  font-weight: 600;
  transition: background 0.15s, border-color 0.15s, transform 0.15s;
}
button:hover { background: linear-gradient(180deg, rgba(30,41,59,0.98), rgba(15,23,42,1)); border-color: rgba(148,163,184,0.42); transform: translateY(-1px); }
.card {
  background: linear-gradient(180deg, rgba(24,34,53,0.96), rgba(15,23,42,0.98));
  border: 1px solid rgba(148,163,184,0.2);
  border-radius: 18px;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.04),
    0 10px 28px rgba(15,23,42,0.08);
  transition: background 0.2s, border-color 0.2s;
}
.mod-btn {
  border: 1px solid;
  border-radius: 11px;
  padding: 5px 11px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
}
.mod-btn:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  const MODS=[
    {id:'chin', name:'Chinesisch',    s:'CHN',  c:'#60a5fa'},
    {id:'ms',   name:'Masterseminar', s:'MS',   c:'#a78bfa'},
    {id:'uam',  name:'UAM',          s:'UAM',  c:'#fbbf24'},
    {id:'fof2', name:'FoF2',         s:'FoF2', c:'#4ade80'},
    {id:'am',   name:'Alg. Mgmt',    s:'AM',   c:'#22d3ee'},
    {id:'kum',  name:'KUM',          s:'KUM',  c:'#fb923c'},
    {id:'tuu',  name:'TuU KI',       s:'TuU',  c:'#f472b6'},
    {id:'hiwi', name:'HiWi',         s:'HiWi', c:'#94a3b8', dashed:true},
  ];
  const EXAMS=[
    {mid:'chin', d:'2026-07-15', l:'Chinesisch Prüfung'},
    {mid:'ms',   d:'2026-06-19', l:'Masterseminar Abgabe'},
    {mid:'uam',  d:'2026-07-30', l:'UAM Klausur'},
    {mid:'fof2', d:'2026-07-31', l:'FoF2 Klausur'},
    {mid:'am',   d:'2026-08-18', l:'AM Klausur'},
    {mid:'kum',  d:'2026-08-26', l:'KUM Klausur'},
  ].sort((a,b)=>a.d.localeCompare(b.d));

  const SCFG={
    1:{ morning:{ badge:{l:'Chinesisch VL',short:'CHN VL',t:'8:00–9:30',c:'#60a5fa'} }, noon:{}, evening:{} },
    3:{ morning:{}, noon:{ badge:{l:'Chinesisch VL',short:'CHN VL',t:'15:20–17:00',c:'#60a5fa'} }, evening:{} },
  };
  const SLOT_LABELS={morning:'Morgen',noon:'Nachmittag',evening:'Abend'};
  const DS_S=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const DS_L=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

  const viewParam=new URLSearchParams(location.search).get('view');
  const showDays =!viewParam||viewParam==='days';
  const showExams=!viewParam||viewParam==='exams';

  const todayDate=new Date(); todayDate.setHours(0,0,0,0);
  let CD=new Date(todayDate);
  let plans={}, active=null;

  (function loadData(){
    try{
      const v2=localStorage.getItem('lernplan_v2');
      if(v2){
        plans=JSON.parse(v2);
        let dirty=false;
        for(const [date,slots] of Object.entries(plans)){
          if('afternoon' in slots){
            const dow=new Date(date).getDay();
            const t=dow===1?'evening':'noon';
            if(!slots[t]) slots[t]=slots.afternoon;
            delete slots.afternoon; dirty=true;
          }
        }
        if(dirty) save();
        return;
      }
      const v1=localStorage.getItem('lernplan_v1');
      if(!v1) return;
      const old=JSON.parse(v1);
      const idx={Mo:0,Di:1,Mi:2,Do:3,Fr:4,Sa:5};
      for(const [ws,slots] of Object.entries(old)){
        const mon=new Date(ws);
        for(const [key,mid] of Object.entries(slots)){
          const[abbr,sl]=key.split('-');
          if(idx[abbr]===undefined) continue;
          const d=new Date(mon); d.setDate(d.getDate()+idx[abbr]);
          const dk=d.toISOString().split('T')[0];
          if(!plans[dk]) plans[dk]={};
          const dow=d.getDay();
          if(sl==='morning') plans[dk].morning=mid;
          else plans[dk][dow===1?'evening':'noon']=mid;
        }
      }
      save();
    }catch(e){}
  })();

  window._pd=()=>{ CD=addD(CD,-1); active=null; render(); };
  window._nd=()=>{ CD=addD(CD,1);  active=null; render(); };
  window._ht=()=>{ CD=new Date(todayDate); active=null; render(); };
  window._cl=()=>{
    plans={};
    active=null;
    save();
    render();
  };
  window._ts=(dk,sl)=>{ active=(active?.dk===dk&&active?.sl===sl)?null:{dk,sl}; render(); };
  window._sm=(mid)=>{
    if(!active) return;
    if(!plans[active.dk]) plans[active.dk]={};
    const current=getSlotDataByKey(active.dk,active.sl);
    if(mid) plans[active.dk][active.sl]=current.lectureLabel?{moduleId:mid,lectureLabel:current.lectureLabel}:mid;
    else    delete plans[active.dk][active.sl];
    active=null; save(); render();
  };
  window._sc=()=>{
    if(!active) return;
    const input=document.getElementById('custom-module-input');
    const value=input?.value.trim();
    if(!value) return;
    if(!plans[active.dk]) plans[active.dk]={};
    const current=getSlotDataByKey(active.dk,active.sl);
    plans[active.dk][active.sl]=current.lectureLabel
      ?{moduleId:'custom:'+value,lectureLabel:current.lectureLabel}
      :'custom:'+value;
    active=null;
    save();
    render();
  };
  window._svl=()=>{
    if(!active) return;
    const input=document.getElementById('custom-lecture-input');
    const value=input?.value.trim();
    if(!value) return;
    if(!plans[active.dk]) plans[active.dk]={};
    const current=getSlotDataByKey(active.dk,active.sl);
    plans[active.dk][active.sl]={
      ...(current.moduleId?{moduleId:current.moduleId}:{}),
      lectureLabel:value.toUpperCase(),
    };
    active=null;
    save();
    render();
  };

  function addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function getMon(d){ const dt=new Date(d); dt.setHours(0,0,0,0); const day=dt.getDay(); dt.setDate(dt.getDate()-(day===0?6:day-1)); return dt; }
  function dkey(d){ return d.toISOString().split('T')[0]; }
  function kw(d){
    const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dn=dt.getUTCDay()||7; dt.setUTCDate(dt.getUTCDate()+4-dn);
    return Math.ceil((((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/86400000)+1)/7);
  }
  function fmt(d){ return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
  function duc(s){ const n=new Date(); n.setHours(0,0,0,0); return Math.ceil((new Date(s)-n)/86400000); }
  function getSlotDataValue(v){
    if(!v) return {moduleId:null,lectureLabel:null};
    if(typeof v==='string') return {moduleId:v,lectureLabel:null};
    return {moduleId:v.moduleId||null,lectureLabel:v.lectureLabel||null};
  }
  function getSlotDataByKey(dk,sl){ return getSlotDataValue(plans[dk]?.[sl]||null); }
  function getSlotData(d,sl){ return getSlotDataByKey(dkey(d),sl); }
  function gs(d,sl){ return getSlotData(d,sl).moduleId; }
  function save(){ try{ localStorage.setItem('lernplan_v2',JSON.stringify(plans)); }catch(e){} }
  function getMod(mid){ return MODS.find(x=>x.id===mid)||null; }
  function getSlotItem(mid){
    if(!mid) return null;
    const mod=getMod(mid);
    if(mod) return {label:mod.s,color:mod.c,dashed:!!mod.dashed,isHiwi:mod.id==='hiwi'};
    if(mid.startsWith('custom:')){
      return {label:mid.slice(7),color:'#334155',dashed:true,isCustom:true};
    }
    return {label:mid,color:'#334155',dashed:true,isCustom:true};
  }

  function slotCfg(dow,sl){ return ((SCFG[dow]||{})[sl])||{}; }
  function isDayComplete(d){
    const dow=d.getDay();
    return ['morning','noon','evening'].every(sl=>gs(d,sl));
  }

  function slotHtml(d, sl, mt){
    const dow=d.getDay();
    const cfg=slotCfg(dow,sl);
    const data=getSlotData(d,sl);
    const m=data.moduleId;
    const item=getSlotItem(m);
    const dk=dkey(d);
    const isA=active?.dk===dk&&active?.sl===sl;
    const lbl=SLOT_LABELS[sl];
    const slotBaseStyle=`flex:1;`;

    let bg,bd;
    if(item){
      if(item.isHiwi){
        bg='linear-gradient(180deg, rgba(226,232,240,0.96), rgba(203,213,225,0.98))';
        bd='rgba(148,163,184,0.75)';
      } else if(item.isCustom){
        bg='linear-gradient(180deg, rgba(203,213,225,0.92), rgba(148,163,184,0.98))';
        bd='rgba(71,85,105,0.72)';
      } else {
        bg=item.color.startsWith('var(')
          ?'linear-gradient(180deg, rgba(148,163,184,0.3), rgba(148,163,184,0.3)), linear-gradient(180deg, rgba(255,255,255,1), rgba(248,250,252,1))'
          :`linear-gradient(180deg, ${item.color}4d, ${item.color}4d), linear-gradient(180deg, rgba(255,255,255,1), rgba(248,250,252,1))`;
        bd=item.color.startsWith('var(')?'rgba(148,163,184,0.55)':item.color+'88';
      }
    }
    else if(isA){ bg='linear-gradient(180deg, rgba(255,255,255,1), rgba(241,245,249,1))'; bd='rgba(96,165,250,0.7)'; }
    else { bg='linear-gradient(180deg, rgba(248,250,252,0.98), rgba(241,245,249,1))'; bd='rgba(203,213,225,0.95)'; }
    const borderStyle=item?.dashed?'dashed':'solid';

    let inner='';
    const badgeSource=cfg.badge?{label:cfg.badge.short||cfg.badge.l,color:cfg.badge.c}:data.lectureLabel?{label:data.lectureLabel,color:'#60a5fa'}:null;
    const badgeHtml=badgeSource?(()=>{
      const b=badgeSource;
      return `<div style="position:absolute;top:0;left:0;display:flex;align-items:center;justify-content:center;min-width:64px;max-width:72px;background:${b.color}16;border-right:1px solid ${b.color}40;border-bottom:1px solid ${b.color}40;border-radius:14px 0 14px 0;padding:3px 8px;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,0.42);z-index:2">
        <span style="min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:9px;font-weight:900;letter-spacing:0.04em;color:#4d89df">${b.label}</span>
      </div>`;
    })():'';

    const contentColor=item?.isHiwi?'#475569':item?.isCustom?'#1e293b':item?.color||'var(--plus-color)';
    const labelHtml=item
      ?`<span style="font-size:${item.isCustom?'11':'13'}px;font-weight:${item.isCustom?'600':'800'};color:${contentColor};max-width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:${item.isHiwi?'0 1px 0 rgba(255,255,255,0.04)':'none'}">${item.label}</span>`
      :`<span style="font-size:16px;color:var(--plus-color);line-height:1">+</span>${!cfg.badge?`<span style="font-size:10px;color:#64748b;margin-top:2px">${lbl}</span>`:''}`;

    inner+=badgeHtml;
    inner+=`<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;min-height:0;padding:4px 8px 6px;text-align:center">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;max-width:100%;min-height:0">${labelHtml}</div>
    </div>`;

    return `<button class="slot" onclick="_ts('${dk}','${sl}')" style="${slotBaseStyle}background:${bg};border-color:${bd};border-style:${borderStyle};position:relative">${inner}</button>`;
  }

  function render(){
    const days=[addD(CD,-1),new Date(CD),addD(CD,1)];
    const todayTs=todayDate.getTime();
    let h='';

    if(showDays){
      // ── Header: same width as deadlines (full #root width) ────────────
      h+=`<div style="text-align:center;cursor:pointer;margin-bottom:12px" onclick="_ht()">
        <div style="font-size:16px;font-weight:800;letter-spacing:0.01em;color:var(--text-dark)">KW ${kw(CD)} &middot; ${fmt(days[0])} &ndash; ${fmt(days[2])}</div>
      </div>`;

      h+=`<div style="margin-bottom:${showExams?'40':'10'}px">
        <div class="day-grid">`;

      for(let i=0;i<3;i++){
        const dd=days[i];
        const isTod=dd.getTime()===todayTs;
        const dow=dd.getDay();
        const isMon=dow===1;
        const complete=isDayComplete(dd);
        const borderColor=complete?'rgba(74,222,128,0.45)':isTod?'var(--today-border)':'var(--border)';
        const cardBg=isTod?'var(--card-today)':'var(--card)';

        h+=`<div class="day-card" style="background:${cardBg};border-color:${borderColor}">
          <!-- Day header: name · date in one line -->
          <div style="text-align:center;margin-bottom:6px;flex-shrink:0;white-space:nowrap">
            <span style="font-size:15px;font-weight:800;color:${isTod?'#7cc4ff':'var(--text)'}">${DS_S[dow]}</span>
            <span style="font-size:13px;font-weight:700;color:var(--text-muted)"> &middot; ${fmt(dd)}</span>
          </div>`;

        h+=`<div style="position:relative;display:flex;flex-direction:column;flex:1;min-height:0;gap:4px">`;
        h+=slotHtml(dd,'morning',4);
        h+=slotHtml(dd,'noon',4);

        // HiWi badge on Monday: only covers morning + noon slots
        if(isMon){
          h+=`<div style="position:absolute;right:0;top:0;height:calc((100% - 8px) * 0.6667 + 4px);width:28%;
                          background:linear-gradient(180deg, rgba(96,165,250,0.34), rgba(59,130,246,0.22));
                          border-left:1px solid rgba(96,165,250,0.48);
                          box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06);
                          border-radius:0 8px 8px 0;
                          display:flex;align-items:center;justify-content:center;
                          pointer-events:none;">
            <span style="writing-mode:vertical-rl;transform:rotate(180deg);
                         color:#1e3a5f;font-size:13px;font-weight:900;
                         text-shadow:0 1px 0 rgba(255,255,255,0.22);
                         letter-spacing:0.12em;text-transform:uppercase;">HiWi</span>
          </div>`;
        }

        h+=slotHtml(dd,'evening',4);
        h+=`</div>`;

        h+=`</div>`; // end day-card
      }

      h+=`</div>`; // end .day-grid
      h+=`</div>`;
    }

    // ── Exams: same width as grid (full #root width), 2-column ──────────
    if(showExams){
      h+=`<div class="card" style="padding:14px 14px 12px">
        <div style="font-size:10px;font-weight:700;color:var(--text-muted);
                    text-transform:uppercase;letter-spacing:0.14em;margin-bottom:10px">
          Prüfungen &amp; Deadlines
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">`;

      EXAMS.forEach(e=>{
        const mod=MODS.find(m=>m.id===e.mid);
        const d=duc(e.d);
        const uc=d<=14?'#f87171':d<=28?'#fbbf24':'#4ade80';
        const isAbgabe=e.l.includes('Abgabe');
        const type=isAbgabe?'Abgabe':e.l.includes('Prüfung')?'Prüfung':'Klausur';
        const col=mod?.c||'#888';
        // One-line format: "MS Abgabe · 19.06." + "38d" right
        const label=`${mod?.s||''} ${type}${isAbgabe?' 📝':''}`;
        h+=`<div style="background:linear-gradient(180deg, ${col}26, ${col}26), linear-gradient(180deg, rgba(255,255,255,1), rgba(248,250,252,1));
                        border:1px solid ${col}42;border-radius:12px;padding:7px 9px;
                        box-shadow:inset 0 1px 0 rgba(255,255,255,0.72), 0 2px 8px rgba(15,23,42,0.05);
                        display:flex;align-items:center;justify-content:space-between;gap:4px">
          <div style="display:flex;align-items:center;gap:6px;min-width:0">
            <div style="width:10px;height:10px;border-radius:50%;background:${col};box-shadow:0 0 12px ${col}55;flex-shrink:0"></div>
            <span style="font-size:12px;font-weight:700;color:var(--text-dark);
                         white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
              ${label} <span style="font-weight:500;color:#64748b">&middot; ${fmt(new Date(e.d))}</span>
            </span>
          </div>
          <span style="font-size:16px;font-weight:800;color:${uc};flex-shrink:0">
            ${d>0?d+'d':d===0?'Heute':'–'}
          </span>
        </div>`;
      });

      h+=`</div></div>`; // end grid + card
    }

    // ── Module Picker: below exams, in flow ───────────────────────────────
    if(active!==null){
      const activeDay=days.find(d=>dkey(d)===active.dk);
      const dow=activeDay?.getDay()??0;
      const lbl=SLOT_LABELS[active.sl]||active.sl;
      const dayName=activeDay?DS_L[dow]:active.dk;
      h+=`<div style="margin-top:16px">
        <div class="card" style="padding:12px 13px;border:1px solid rgba(226,232,240,0.18)">
          <div style="font-size:11px;font-weight:700;color:var(--text-muted);
                      margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid rgba(226,232,240,0.08)">
            ${dayName} &middot; ${lbl} &mdash; Modul wählen
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:8px">
            ${MODS.map(m=>`<button class="mod-btn" onclick="_sm('${m.id}')" style="background:${m.dashed?'rgba(148,163,184,0.12)':m.c+'18'};border-color:${m.dashed?'rgba(148,163,184,0.42)':m.c+'50'};border-style:${m.dashed?'dashed':'solid'};color:${m.c};box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)">${m.s}</button>`).join('')}
            <button onclick="_sm(null)" style="padding:5px 11px;font-size:11px;color:var(--text-muted)">&#10005; leeren</button>
          </div>
          <div style="display:flex;gap:8px;margin-top:10px">
            <input id="custom-module-input" type="text" placeholder="Eigener Eintrag" style="flex:1;min-width:0;background:rgba(15,23,42,0.36);border:1px dashed rgba(226,232,240,0.2);border-radius:12px;padding:8px 10px;color:var(--text);font:inherit;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)">
            <button onclick="_sc()" style="padding:0 14px;font-size:11px;color:var(--text);border:1px solid rgba(226,232,240,0.2)">Eintragen</button>
          </div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <input id="custom-lecture-input" type="text" placeholder="VL-Pill z. B. CHN VL" style="flex:1;min-width:0;background:rgba(15,23,42,0.36);border:1px dashed rgba(96,165,250,0.35);border-radius:12px;padding:8px 10px;color:var(--text);font:inherit;outline:none;box-shadow:inset 0 1px 0 rgba(255,255,255,0.03)">
            <button onclick="_svl()" style="padding:0 14px;font-size:11px;color:#93c5fd;border:1px solid rgba(96,165,250,0.28)">VL</button>
          </div>
        </div>
      </div>`;
    }

    if(showDays){
      h+=`<div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-top:104px;padding-bottom:14px">
        <button onclick="_pd()" style="width:46px;height:38px;padding:0;font-size:18px;
                line-height:1;display:flex;align-items:center;justify-content:center">&#8249;</button>
        <button onclick="_ht()" style="height:38px;padding:0 16px;font-size:11px;letter-spacing:0.02em;
                line-height:1;display:flex;align-items:center;justify-content:center">Heute</button>
        <button onclick="_cl()" style="height:38px;padding:0 16px;font-size:11px;letter-spacing:0.02em;
                line-height:1;display:flex;align-items:center;justify-content:center">Clear</button>
        <button onclick="_nd()" style="width:46px;height:38px;padding:0;font-size:18px;
                line-height:1;display:flex;align-items:center;justify-content:center">&#8250;</button>

    }

    document.getElementById('root').innerHTML=h;
  }

  render();
})();
