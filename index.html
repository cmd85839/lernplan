<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lernplan</title>
<style>
:root {
  --bg: #0f172a;
  --card: #1e293b;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --text-muted: #475569;
  --border: rgba(148,163,184,0.15);
  --border-btn: rgba(148,163,184,0.28);
  --slot-hover: rgba(255,255,255,0.04);
  --btn-hover: rgba(255,255,255,0.06);
  --today-border: rgba(59,130,246,0.5);
  --plus-color: #334155;
}
:root.light {
  --bg: #f1f5f9;
  --card: #ffffff;
  --text: #0f172a;
  --text-dim: #334155;
  --text-muted: #64748b;
  --border: rgba(0,0,0,0.08);
  --border-btn: rgba(0,0,0,0.18);
  --slot-hover: rgba(0,0,0,0.03);
  --btn-hover: rgba(0,0,0,0.05);
  --today-border: rgba(59,130,246,0.55);
  --plus-color: #c7d2e0;
}
html, body {
  background: var(--bg) !important;
  color: var(--text);
  margin: 0; padding: 0;
  transition: background 0.2s, color 0.2s;
}
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  padding: 10px;
}
#root { max-width: 720px; margin: 0 auto; }

/* Calendar grid: fixed height so section boundary never moves */
.day-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  grid-template-rows: 1fr;
  min-height: 192px;
  gap: 6px;
  margin-bottom: 10px;
}
.day-card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  padding: 7px 5px;
  display: flex;
  flex-direction: column;
  transition: background 0.2s, border-color 0.2s;
}

button {
  background: transparent;
  border: 0.5px solid var(--border-btn);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 6px;
  font-family: inherit;
  font-size: inherit;
  transition: background 0.15s;
}
button:hover { background: var(--btn-hover); }
.card {
  background: var(--card);
  border: 0.5px solid var(--border);
  border-radius: 10px;
  transition: background 0.2s, border-color 0.2s;
}
.slot {
  background: transparent;
  border: 0.5px solid var(--border);
  border-radius: 7px;
  padding: 4px 3px;
  cursor: pointer;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-top: 4px;
  width: 100%;
  flex: 1;
  transition: background 0.15s, border-color 0.15s;
}
.slot:hover { background: var(--slot-hover); }
.mod-btn {
  border: 1px solid;
  border-radius: 7px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
}
.mod-btn:hover { opacity: 0.8; }
</style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  const MODS=[
    {id:'chin',name:'Chinesisch',s:'CHN',c:'#60a5fa'},
    {id:'ms',name:'Masterseminar',s:'MS',c:'#a78bfa'},
    {id:'uam',name:'UAM',s:'UAM',c:'#fbbf24'},
    {id:'fof2',name:'FoF2',s:'FoF2',c:'#4ade80'},
    {id:'am',name:'Alg. Mgmt',s:'AM',c:'#22d3ee'},
    {id:'kum',name:'KUM',s:'KUM',c:'#fb923c'},
    {id:'tuu',name:'TuU KI',s:'TuU',c:'#f472b6'},
  ];
  const EXAMS=[
    {mid:'chin',d:'2026-07-15',l:'Chinesisch Prüfung'},
    {mid:'ms',d:'2026-06-19',l:'Masterseminar Abgabe'},
    {mid:'uam',d:'2026-07-30',l:'UAM Klausur'},
    {mid:'fof2',d:'2026-07-31',l:'FoF2 Klausur'},
    {mid:'am',d:'2026-08-18',l:'AM Klausur'},
    {mid:'kum',d:'2026-08-26',l:'KUM Klausur'},
  ];
  // Keyed by JS getDay() (0=So,1=Mo,...,6=Sa)
  const FX={
    1:[{l:'Chinesisch VL',t:'8:00–9:30',c:'#60a5fa'},{l:'HiWi Tag',t:'ganztags',c:'#64748b'}],
    3:[{l:'Chinesisch VL',t:'15:20–17:00',c:'#60a5fa'}],
  };
  const DS_S=['So','Mo','Di','Mi','Do','Fr','Sa'];
  const DS_L=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];

  const todayDate=new Date(); todayDate.setHours(0,0,0,0);
  let CD=new Date(todayDate);
  let plans={}, active=null, dark=true;

  (function loadData(){
    try{
      const v2=localStorage.getItem('lernplan_v2');
      if(v2){ plans=JSON.parse(v2); return; }
      const v1=localStorage.getItem('lernplan_v1');
      if(!v1) return;
      const old=JSON.parse(v1);
      const dayIdx={Mo:0,Di:1,Mi:2,Do:3,Fr:4,Sa:5};
      for(const [ws,slots] of Object.entries(old)){
        const mon=new Date(ws);
        for(const [key,mid] of Object.entries(slots)){
          const [abbr,sl]=key.split('-');
          if(dayIdx[abbr]===undefined) continue;
          const d=new Date(mon); d.setDate(d.getDate()+dayIdx[abbr]);
          const dk=d.toISOString().split('T')[0];
          if(!plans[dk]) plans[dk]={};
          plans[dk][sl]=mid;
        }
      }
    }catch(e){}
  })();

  try{ const d=localStorage.getItem('lernplan_dark'); if(d!==null) dark=d==='1'; }catch(e){}

  function applyTheme(){ document.documentElement.classList.toggle('light',!dark); }
  applyTheme();

  window._pd=()=>{ CD=addD(CD,-1); active=null; render(); };
  window._nd=()=>{ CD=addD(CD,1); active=null; render(); };
  window._ht=()=>{ CD=new Date(todayDate); active=null; render(); };
  window._ts=(dk,sl)=>{ active=(active?.dk===dk&&active?.sl===sl)?null:{dk,sl}; render(); };
  window._sm=(mid)=>{
    if(!active) return;
    if(!plans[active.dk]) plans[active.dk]={};
    if(mid) plans[active.dk][active.sl]=mid;
    else delete plans[active.dk][active.sl];
    active=null; save(); render();
  };
  window._tm=()=>{ dark=!dark; localStorage.setItem('lernplan_dark',dark?'1':'0'); applyTheme(); render(); };

  function addD(d,n){ const r=new Date(d); r.setDate(r.getDate()+n); return r; }
  function dkey(d){ return d.toISOString().split('T')[0]; }
  function kw(d){
    const dt=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
    const dn=dt.getUTCDay()||7;
    dt.setUTCDate(dt.getUTCDate()+4-dn);
    return Math.ceil((((dt-new Date(Date.UTC(dt.getUTCFullYear(),0,1)))/86400000)+1)/7);
  }
  function fmt(d){ return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit'}); }
  function duc(s){ const n=new Date(); n.setHours(0,0,0,0); return Math.ceil((new Date(s)-n)/86400000); }
  function gs(d,sl){ return plans[dkey(d)]?.[sl]||null; }
  function save(){ try{ localStorage.setItem('lernplan_v2',JSON.stringify(plans)); }catch(e){} }

  function slotHtml(d,sl){
    const m=gs(d,sl); const mod=m?MODS.find(x=>x.id===m):null;
    const dk=dkey(d);
    const isA=active?.dk===dk&&active?.sl===sl;
    const isMon=d.getDay()===1;
    const lbl=sl==='morning'?'Vormittag':isMon?'Abend':'Nachmittag';

    let bg,bd;
    if(mod){ bg=mod.c+'18'; bd=mod.c+'66'; }
    else if(isA){ bg=dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.05)'; bd=dark?'rgba(148,163,184,0.4)':'rgba(0,0,0,0.22)'; }
    else { bg='transparent'; bd='var(--border)'; }

    return `<button class="slot" onclick="_ts('${dk}','${sl}')" style="background:${bg};border-color:${bd}">
      ${mod
        ?`<span style="font-size:12px;font-weight:600;color:${mod.c}">${mod.s}</span><span style="font-size:9px;color:${mod.c}99">${lbl}</span>`
        :`<span style="font-size:9px;color:var(--text-muted)">${lbl}</span><span style="font-size:15px;color:var(--plus-color);line-height:1">+</span>`
      }
    </button>`;
  }

  function render(){
    const days=[addD(CD,-1),new Date(CD),addD(CD,1)];
    const todayTs=todayDate.getTime();
    const themeIcon=dark?'&#9728;':'&#9790;';

    // ── Header ──────────────────────────────────────────────────────────
    let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <button onclick="_pd()" style="padding:5px 13px;font-size:19px;line-height:1">&#8249;</button>
      <div style="text-align:center;cursor:pointer;flex:1;margin:0 6px" onclick="_ht()">
        <div style="font-size:14px;font-weight:600;color:var(--text)">KW ${kw(CD)} &middot; Lernplan</div>
        <div style="font-size:11px;color:var(--text-muted)">${fmt(days[0])} &ndash; ${fmt(days[2])}</div>
      </div>
      <div style="display:flex;gap:5px;align-items:center">
        <button onclick="_tm()" style="padding:5px 9px;font-size:15px;line-height:1">${themeIcon}</button>
        <button onclick="_nd()" style="padding:5px 13px;font-size:19px;line-height:1">&#8250;</button>
      </div>
    </div>`;

    // ── 3-Day Grid (fixed height via CSS class) ──────────────────────────
    h+=`<div class="day-grid">`;

    for(let i=0;i<3;i++){
      const dd=days[i];
      const isTod=dd.getTime()===todayTs;
      const dow=dd.getDay();
      const isMon=dow===1;
      const fx=FX[dow]||[];

      h+=`<div class="day-card" style="${isTod?'border-color:var(--today-border)':''}">
        <div style="text-align:center;margin-bottom:5px">
          <div style="font-size:13px;font-weight:600;color:${isTod?'#60a5fa':'var(--text)'}">${DS_S[dow]}</div>
          <div style="font-size:10px;color:var(--text-muted)">${fmt(dd)}</div>
        </div>`;

      for(const f of fx)
        h+=`<div style="background:${f.c}15;border-left:2px solid ${f.c};border-radius:3px;padding:3px 5px;margin-bottom:3px;flex-shrink:0">
          <div style="font-size:10px;font-weight:500;color:${f.c};line-height:1.3">${f.l}</div>
          <div style="font-size:9px;color:${f.c}99">${f.t}</div>
        </div>`;

      if(!isMon) h+=slotHtml(dd,'morning');
      h+=slotHtml(dd,'afternoon');
      h+=`</div>`;
    }

    h+=`</div>`;

    // ── Exams (boundary stays fixed: module picker is BELOW this) ────────
    // Sort by date so Masterseminar (19.06) comes first
    const sortedExams=[...EXAMS].sort((a,b)=>a.d.localeCompare(b.d));

    h+=`<div class="card" style="padding:9px 10px">
      <div style="font-size:10px;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:7px">Prüfungen &amp; Deadlines</div>`;

    sortedExams.forEach((e,idx)=>{
      const mod=MODS.find(m=>m.id===e.mid);
      const d=duc(e.d);
      const uc=d<=14?'#f87171':d<=28?'#fbbf24':'#4ade80';
      h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;${idx<sortedExams.length-1?'border-bottom:0.5px solid var(--border)':''}">
        <div style="display:flex;align-items:center;gap:7px">
          <div style="width:6px;height:6px;border-radius:50%;background:${mod?.c||'#888'};flex-shrink:0"></div>
          <span style="font-size:12px;color:var(--text)">${e.l}</span>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:11px;color:var(--text-muted)">${fmt(new Date(e.d))}</span>
          <span style="font-size:12px;font-weight:500;color:${uc};min-width:32px;text-align:right">${d>0?d+'d':d===0?'Heute':'&ndash;'}</span>
        </div>
      </div>`;
    });
    h+=`</div>`;

    // ── Module Picker (after exams → doesn't shift the boundary above) ──
    if(active!==null){
      const activeDay=days.find(d=>dkey(d)===active.dk);
      const isMon=activeDay?.getDay()===1;
      const lbl=active.sl==='morning'?'Vormittag':isMon?'Abend':'Nachmittag';
      const dayName=activeDay?DS_L[activeDay.getDay()]:active.dk;
      h+=`<div class="card" style="padding:10px;margin-top:10px;border-color:var(--border-btn)">
        <div style="font-size:11px;color:var(--text-muted);margin-bottom:8px">${dayName} &middot; ${lbl} &mdash; Modul wählen</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${MODS.map(m=>`<button class="mod-btn" onclick="_sm('${m.id}')" style="background:${m.c}18;border-color:${m.c}55;color:${m.c}">${m.s}</button>`).join('')}
          <button onclick="_sm(null)" style="padding:4px 10px;font-size:12px;color:var(--text-muted)">&#10005; leeren</button>
        </div>
      </div>`;
    }

    document.getElementById('root').innerHTML=h;
  }

  render();
})();
</script>
</body>
</html>
